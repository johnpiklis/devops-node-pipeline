name: Node.js CI
 
on:
  push:
    branches: main
  pull_request:
    branches: main

permissions:
  contents: read
  security-events: write

 
jobs:
  build-test:
    runs-on: ubuntu-latest
 
    strategy:
      matrix:
        node-version: [22.x]
        
    steps:
    #checking out the repo
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
 
        #setting up node.js   
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
 
    - name: Installing dependencies
      run: npm ci
      # Build the project
    - name: Build
      run: npm run build --if-present

    - name: Run App Test
      run: |
        node app.js &
        sleep 5
        curl http://localhost:3000/health


      # Run Snyk to check for vulnerabilities
    - name: Run Snyk
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        command: test
        args: --severity-threshold=high --sarif-file-output=snyk.sarif
      continue-on-error: true # Allow workflow to continue even if vulnerabilities are found

    - name: Upload SARIF to GitHub
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: snyk.sarif

    - name: Snyk Monitor
      uses: snyk/actions/node@master
      with:
        command: monitor
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}


      # Run SonarQube scan
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v6
      env:
       SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
       SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      with:
       args: >
        -Dsonar.projectKey=devops-node-app          
        -Dsonar.organization=devops-node-app          
        -Dsonar.sources=.                       
        -Dsonar.exclusions=node_modules/*,dist/*            
        -Dsonar.qualitygate.wait=true
        -Dsonar.branch.name=main
      continue-on-error: true

    - name: Build Docker Image
      run: docker build -t devops-node-app .

    - name: Login DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Push Docker Image
      run: |
        docker tag devops-node-app ${{ secrets.DOCKERHUB_USERNAME }}/devops-node-app:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/devops-node-app:latest
